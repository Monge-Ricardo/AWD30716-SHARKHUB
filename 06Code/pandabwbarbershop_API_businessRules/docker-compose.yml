services:
  business-rules-api:
    build:
      context: .
      dockerfile: Dockerfile
    # Exponer internamente para Caddy, no en el host
    expose:
      - "3001"
    env_file:
      - .env
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy_backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - business-rules-api

volumes:
  caddy_data:
  caddy_config:
