<main id="main-content">
    <!-- Page Header Start -->
    <div class="container-fluid page-header py-5 mb-5 wow fadeIn" data-wow-delay="0.1s">
        <div class="container text-center py-5">
            <h1 class="display-3 text-white text-uppercase mb-3 animated slideInDown">Contact</h1>
            <nav aria-label="breadcrumb animated slideInDown">
                <ol class="breadcrumb justify-content-center text-uppercase mb-0">
                    <li class="breadcrumb-item"><a class="text-white" href="#">Home</a></li>
                    <li class="breadcrumb-item"><a class="text-white" href="#">Pages</a></li>
                    <li class="breadcrumb-item text-primary active" aria-current="page">Contact</li>
                </ol>
            </nav>
        </div>
    </div>
    <!-- Page Header End -->
    <!-- Contact Start -->
    <div class="container-xxl py-5">
        <div class="container">
            <div class="row g-0">
                <div class="col-lg-6 wow fadeIn" data-wow-delay="0.1s">
                    <div class="form-wrapper w-100" style="max-width: 100%; margin: 0; padding: 3rem;">
                        <div class="form-header text-start mb-4">
                            <p class="d-inline-block bg-dark text-primary py-1 px-4 mb-3"
                                style="font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">
                                Contact Us</p>
                            <h2 class="text-start" style="font-size: 2.2rem;">Have Any Query?</h2>
                            <p class="text-start mt-2">Please feel free to reach out. We usually respond within 24
                                hours.</p>
                        </div>
                        <form>
                            <div class="row g-4">
                                <div class="col-md-6 form-group mb-0 form-animated-element stagger-1">
                                    <label class="form-label-custom" for="name">Your Name</label>
                                    <input type="text" class="form-control-custom" id="name" placeholder="John Doe">
                                </div>
                                <div class="col-md-6 form-group mb-0 form-animated-element stagger-2">
                                    <label class="form-label-custom" for="email">Your Email</label>
                                    <input type="email" class="form-control-custom" id="email"
                                        placeholder="john@example.com">
                                </div>
                                <div class="col-12 form-group mb-0 form-animated-element stagger-3">
                                    <label class="form-label-custom" for="subject">Subject</label>
                                    <input type="text" class="form-control-custom" id="subject"
                                        placeholder="How can we help?">
                                </div>
                                <div class="col-12 form-group mb-0 form-animated-element stagger-4">
                                    <label class="form-label-custom" for="message">Message</label>
                                    <textarea class="form-control-custom" placeholder="Leave your message here..."
                                        id="message" style="height: 120px; resize: none;"></textarea>
                                </div>
                                <div class="col-12 form-animated-element stagger-5 mt-2">
                                    <button class="btn-submit-custom" type="submit">Send Message <i
                                            class="fa fa-paper-plane ms-2"></i></button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-6 wow fadeIn" data-wow-delay="0.5s">
                    <div class="h-100" style="min-height: 400px;">
                        <iframe class="google-map w-100 h-100"
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3001156.4288297426!2d-78.01371936852176!3d42.72876761954724!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4ccc4bf0f123a5a9%3A0xddcfc6c1de189567!2sNew%20York%2C%20USA!5e0!3m2!1sen!2sbd!4v1603794290143!5m2!1sen!2sbd"
                            frameborder="0" allowfullscreen="" aria-hidden="false" tabindex="0"
                            style="filter: grayscale(100%) invert(92%) contrast(83%); border: 0;"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Contact End -->
</main>
